name: Bug
description: Report a defect where the system violates an expected property or behavior.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / validation output
      render: text
      placeholder: Paste any relevant output, validation layer messages, or panic traces.
    validations:
      required: false